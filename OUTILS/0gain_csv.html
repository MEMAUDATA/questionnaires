<!DOCTYPE html>
<html lang="fr">
  <head>
    <!-- Author's details-->
    <meta name="author" content="Nicolas Vannson">
    <meta name="contact" content="hello@memau.eu">
    <meta name="license" content="EUPL-1.2">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <link rel="stylesheet" href="/style.css">
    <style>
      /* ---- Comparateur de scores : styles locaux (le reste vient de style.css) ---- */
      .cmp-root {
        --cmp-surface: #ffffff;
        --cmp-ink: #0b0b0b;
        --cmp-ink-2: #52514e;
        --cmp-grid: #e6e6e2;
        --cmp-axis: #b8b7b1;
      }
      @media (prefers-color-scheme: dark) {
        .cmp-root {
          --cmp-surface: #1a1a19;
          --cmp-ink: #f2f2ee;
          --cmp-ink-2: #c3c2b7;
          --cmp-grid: #33322f;
          --cmp-axis: #55544f;
        }
      }
      .cmp-skipped { color: #b0432f; }
      .cmp-note { color: var(--cmp-ink-2); font-style: italic; }
      #chartArea { overflow-x: auto; background: var(--cmp-surface); }
      #chartArea svg { display: block; }
      .cmp-legend { display: flex; flex-wrap: wrap; gap: 12px; margin: 8px 0; }
      .cmp-legend span { display: inline-flex; align-items: center; gap: 6px; color: var(--cmp-ink); }
      .cmp-legend i { width: 12px; height: 12px; border-radius: 3px; display: inline-block; }
      table.cmp-table { border-collapse: collapse; margin: 12px 0; }
      table.cmp-table th, table.cmp-table td { border: 1px solid var(--cmp-grid); padding: 4px 10px; text-align: left; }
    </style>
    <title>Comparer les scores totaux (PROMS / PREMS)</title>
  </head>
  <body>
    <div class="cmp-root">
      <h1>Comparer les scores totaux</h1>
      <p>Importe plusieurs fichiers <b>.csv</b> exportés depuis les questionnaires (PROMS / PREMS), puis génère un graphe comparant leur <b>score total</b>. Les fichiers sans colonne <i>Score total</i> sont listés mais non tracés.</p>

      <div id="dropArea" class="drag_n_drop">
        <p>Glisse-dépose ici tes fichiers .csv (autant que tu veux)</p>
        <input type="file" id="csvFiles" accept=".csv" multiple style="display:none">
        <div class="buttons-container">
          <button type="button" id="customFileButton">Choisis tes fichiers .csv</button>
        </div>
      </div>

      <p id="fileCount"></p>

      <div class="buttons-container">
        <button type="button" onclick="genererGraphe()">Générer le graphe</button>
        <button type="button" onclick="resetTout()">Réinitialiser</button>
      </div>
      <div class="buttons-container">
        <button type="button" id="pdfButton" style="display:none" onclick="exporterPdf()">Exporter le graphe en PDF</button>
      </div>

      <div id="report"></div>
    </div>

    <script>
      /* =========================================================================
         État : liste cumulée des fichiers importés (ajout illimité)
         ========================================================================= */
      const fichiers = [];               // { name, text }
      const PALETTE = ['#2a78d6','#1baf7a','#eda100','#008300','#4a3aa7','#e34948','#e87ba4','#eb6834'];

      const $ = id => document.getElementById(id);

      /* ---- Sélection / drag & drop ---- */
      $('customFileButton').addEventListener('click', () => $('csvFiles').click());
      $('csvFiles').addEventListener('change', e => { ajouterFichiers(e.target.files); e.target.value = ''; });

      const dropArea = $('dropArea');
      ['dragenter','dragover','dragleave','drop'].forEach(ev => {
        dropArea.addEventListener(ev, p => { p.preventDefault(); p.stopPropagation(); }, false);
        document.body.addEventListener(ev, p => { p.preventDefault(); p.stopPropagation(); }, false);
      });
      ['dragenter','dragover'].forEach(ev => dropArea.addEventListener(ev, () => dropArea.classList.add('highlight')));
      ['dragleave','drop'].forEach(ev => dropArea.addEventListener(ev, () => dropArea.classList.remove('highlight')));
      dropArea.addEventListener('drop', e => ajouterFichiers(e.dataTransfer.files));

      function ajouterFichiers(fileList) {
        const arr = Array.from(fileList).filter(f => f.name.trim().toLowerCase().endsWith('.csv'));
        const rejets = fileList.length - arr.length;
        let lus = 0;
        if (arr.length === 0) { majCompteur(rejets); return; }
        arr.forEach(f => {
          // évite les doublons (même nom déjà importé)
          if (fichiers.some(x => x.name === f.name)) { lus++; if (lus === arr.length) majCompteur(rejets); return; }
          const reader = new FileReader();
          reader.onload = ev => { fichiers.push({ name: f.name, text: ev.target.result }); lus++; if (lus === arr.length) majCompteur(rejets); };
          reader.onerror = () => { lus++; if (lus === arr.length) majCompteur(rejets); };
          reader.readAsText(f);
        });
      }

      function majCompteur(rejets) {
        let msg = `<p>${fichiers.length} fichier(s) .csv prêt(s) : ${fichiers.map(f => f.name).join(', ') || '—'}</p>`;
        if (rejets > 0) msg += `<p class="cmp-skipped">${rejets} fichier(s) ignoré(s) (extension ≠ .csv).</p>`;
        $('fileCount').innerHTML = msg;
      }

      /* =========================================================================
         Parsing CSV (inline, gère guillemets, virgules protégées, CRLF, BOM)
         ========================================================================= */
      function parseCSV(text) {
        text = text.replace(/^\uFEFF/, '');
        const rows = []; let field = '', row = [], inQ = false;
        for (let i = 0; i < text.length; i++) {
          const c = text[i];
          if (inQ) {
            if (c === '"') { if (text[i + 1] === '"') { field += '"'; i++; } else inQ = false; }
            else field += c;
          } else {
            if (c === '"') inQ = true;
            else if (c === ',') { row.push(field); field = ''; }
            else if (c === '\n') { row.push(field); rows.push(row); row = []; field = ''; }
            else if (c === '\r') { /* ignore, géré par \n */ }
            else field += c;
          }
        }
        if (field !== '' || row.length) { row.push(field); rows.push(row); }
        if (!rows.length) return [];
        const header = rows[0].map(h => h.trim());
        return rows.slice(1)
          .filter(r => r.some(x => x.trim() !== ''))
          .map(r => { const o = {}; header.forEach((h, i) => o[h] = (r[i] !== undefined ? r[i] : '').trim()); return o; });
      }

      // Détecte la colonne du score total : "Score Total" ou "Total" (insensible casse/espaces)
      function trouverTotal(row) {
        const keys = Object.keys(row);
        const k = keys.find(k => /^\s*score\s+total\s*$/i.test(k)) || keys.find(k => /^\s*total\s*$/i.test(k));
        if (!k) return null;
        const v = parseFloat(String(row[k]).replace(',', '.'));
        return isNaN(v) ? null : v;
      }

      // Transforme les fichiers en enregistrements traçables + liste des ignorés
      function extraireDonnees(fichiers) {
        const records = [], ignores = [];
        fichiers.forEach(f => {
          let rows;
          try { rows = parseCSV(f.text); } catch (e) { ignores.push({ src: f.name, raison: 'CSV illisible' }); return; }
          if (!rows.length) { ignores.push({ src: f.name, raison: 'aucune donnée' }); return; }
          rows.forEach(row => {
            const q = row['Questionnaire'] || row['questionnaire'] || '?';
            const s = row['Sujet'] || row['sujet'] || '?';
            const d = row['Date'] || row['date'] || '';
            const t = trouverTotal(row);
            if (t === null) ignores.push({ src: f.name, questionnaire: q, sujet: s, date: d, raison: 'pas de colonne « Score total » / « Total »' });
            else records.push({ questionnaire: q, sujet: s, date: d, total: t });
          });
        });
        return { records, ignores };
      }

      /* =========================================================================
         Construction du graphe : barres groupées par questionnaire (SVG pur)
         ========================================================================= */
      function niceCeil(v) {
        if (v <= 0) return 1;
        const p = Math.pow(10, Math.floor(Math.log10(v)));
        const n = v / p;
        const s = n <= 1 ? 1 : n <= 2 ? 2 : n <= 5 ? 5 : 10;
        return s * p;
      }
      const esc = s => String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');

      // Fonction PURE : renvoie une chaîne SVG. Testable sans DOM.
      function construireSVG(records) {
        const groupes = [];
        const parQ = new Map();
        records.forEach(r => { if (!parQ.has(r.questionnaire)) { parQ.set(r.questionnaire, []); groupes.push(r.questionnaire); } parQ.get(r.questionnaire).push(r); });
        const couleur = q => PALETTE[groupes.indexOf(q) % PALETTE.length];

        const totals = records.map(r => r.total);
        let yMax = niceCeil(Math.max(...totals, 0));
        let yMin = Math.min(...totals, 0);
        if (yMin < 0) yMin = -niceCeil(-yMin);
        if (yMax === yMin) yMax = yMin + 1;

        const m = { t: 28, r: 16, b: 104, l: 52 };
        const plotH = 340;
        const n = records.length;
        const interGap = 26, intraGap = 2;
        // largeur de barre : borne haute 64, borne basse 10
        let barW = 34;
        const contentW = n * barW + (n - groupes.length) * intraGap + (groupes.length - 1) * interGap;
        const W = Math.max(760, m.l + m.r + contentW);
        const plotW = W - m.l - m.r;
        const H = m.t + plotH + m.b;
        const y = v => m.t + plotH * (1 - (v - yMin) / (yMax - yMin));
        const y0 = y(0);

        const out = [];
        out.push(`<svg viewBox="0 0 ${W} ${H}" width="${W}" height="${H}" role="img" aria-label="Comparaison des scores totaux" font-family="Arial, Helvetica, sans-serif">`);

        // Grille + axe Y (5 graduations)
        const ticks = 5;
        for (let i = 0; i <= ticks; i++) {
          const val = yMin + (yMax - yMin) * i / ticks;
          const yy = y(val);
          out.push(`<line x1="${m.l}" y1="${yy.toFixed(1)}" x2="${W - m.r}" y2="${yy.toFixed(1)}" stroke="var(--cmp-grid)" stroke-width="1"/>`);
          out.push(`<text x="${m.l - 8}" y="${(yy + 4).toFixed(1)}" text-anchor="end" font-size="12" fill="var(--cmp-ink-2)">${(+val.toFixed(2))}</text>`);
        }
        // Ligne de base (zéro)
        out.push(`<line x1="${m.l}" y1="${y0.toFixed(1)}" x2="${W - m.r}" y2="${y0.toFixed(1)}" stroke="var(--cmp-axis)" stroke-width="1.5"/>`);

        // Barres
        let x = m.l;
        groupes.forEach((q, gi) => {
          const items = parQ.get(q);
          const gStart = x;
          const col = couleur(q);
          items.forEach((r, ii) => {
            const top = y(r.total), base = y0;
            const yTop = Math.min(top, base), h = Math.abs(base - top);
            const rad = Math.min(4, barW / 2, h);
            // rectangle à coins hauts arrondis, ancré à la ligne de base
            const path = `M${x} ${(yTop + h).toFixed(1)} L${x} ${(yTop + rad).toFixed(1)} Q${x} ${yTop.toFixed(1)} ${x + rad} ${yTop.toFixed(1)} L${x + barW - rad} ${yTop.toFixed(1)} Q${x + barW} ${yTop.toFixed(1)} ${x + barW} ${(yTop + rad).toFixed(1)} L${x + barW} ${(yTop + h).toFixed(1)} Z`;
            out.push(`<path d="${path}" fill="${col}"><title>${esc(q)} — ${esc(r.sujet)} (${esc(r.date)}) : ${r.total}</title></path>`);
            // valeur au-dessus (labels directs — obligatoire vu le contraste palette)
            out.push(`<text x="${(x + barW / 2).toFixed(1)}" y="${(Math.min(top, base) - 5).toFixed(1)}" text-anchor="middle" font-size="11" fill="var(--cmp-ink)">${r.total}</text>`);
            // étiquette sujet + date sous la barre (pivotée)
            const lbl = (r.sujet && r.sujet !== '?' ? r.sujet : '') + (r.date ? ' · ' + r.date : '');
            if (lbl) out.push(`<text transform="translate(${(x + barW / 2).toFixed(1)},${(y0 + 8).toFixed(1)}) rotate(-45)" text-anchor="end" font-size="10" fill="var(--cmp-ink-2)">${esc(lbl)}</text>`);
            x += barW; if (ii < items.length - 1) x += intraGap;
          });
          // étiquette du questionnaire sous le groupe
          const cx = (gStart + x) / 2;
          out.push(`<text x="${cx.toFixed(1)}" y="${(H - 14)}" text-anchor="middle" font-size="13" font-weight="bold" fill="${col}">${esc(q)}</text>`);
          if (gi < groupes.length - 1) x += interGap;
        });

        out.push(`</svg>`);
        return { svg: out.join(''), groupes, couleur };
      }

      /* =========================================================================
         Rendu dans la page
         ========================================================================= */
      let dernierRapportPret = false;

      function genererGraphe() {
        const report = $('report');
        if (fichiers.length === 0) {
          report.innerHTML = `<p class="cmp-skipped">Ajoute au moins un fichier .csv.</p>`;
          $('pdfButton').style.display = 'none'; dernierRapportPret = false; return;
        }
        const { records, ignores } = extraireDonnees(fichiers);

        if (records.length === 0) {
          report.innerHTML = `<p class="cmp-skipped">Aucun score total trouvé dans les fichiers importés.</p>` + blocIgnores(ignores);
          $('pdfButton').style.display = 'none'; dernierRapportPret = false; return;
        }

        const { svg, groupes, couleur } = construireSVG(records);

        // Légende
        let legende = '<div class="cmp-legend">';
        groupes.forEach(q => { legende += `<span><i style="background:${couleur(q)}"></i>${esc(q)}</span>`; });
        legende += '</div>';

        // Tableau (vue accessible + relief pour le contraste palette)
        let table = '<table class="cmp-table"><thead><tr><th>Questionnaire</th><th>Sujet</th><th>Date</th><th>Score total</th></tr></thead><tbody>';
        records.forEach(r => { table += `<tr><td>${esc(r.questionnaire)}</td><td>${esc(r.sujet)}</td><td>${esc(r.date)}</td><td>${r.total}</td></tr>`; });
        table += '</tbody></table>';

        report.innerHTML =
          '<h2>Comparaison des scores totaux</h2>' +
          '<p class="cmp-note">Attention : les scores totaux n’ont pas la même échelle selon le questionnaire (ex. SSQ 0–10, GHSI 0–100). La comparaison est surtout pertinente au sein d’un même questionnaire.</p>' +
          legende +
          '<div id="chartArea">' + svg + '</div>' +
          table +
          blocIgnores(ignores);

        $('pdfButton').style.display = 'inline-block';
        dernierRapportPret = true;
      }

      function blocIgnores(ignores) {
        if (!ignores.length) return '';
        let h = `<p class="cmp-skipped"><b>${ignores.length} enregistrement(s) non tracé(s) :</b></p><ul>`;
        ignores.forEach(g => {
          const who = [g.questionnaire, g.sujet, g.date].filter(x => x && x !== '?').join(' · ');
          h += `<li class="cmp-skipped">${esc(g.src)}${who ? ' (' + esc(who) + ')' : ''} — ${esc(g.raison)}</li>`;
        });
        h += '</ul>';
        return h;
      }

      /* =========================================================================
         Export PDF (html2pdf) + Reset
         ========================================================================= */
      function exporterPdf() {
        if (!dernierRapportPret) return;
        const today = new Date().toLocaleDateString('fr-FR');
        const content = document.createElement('div');
        content.lang = 'fr';
        content.innerHTML =
          `<style>
             .rep { text-align:center; color:#000; background:#fff; }
             .rep .head { padding:14px 0; border-bottom:1px solid #2B176C; margin-bottom:16px; }
             .rep table { border-collapse:collapse; margin:12px auto; }
             .rep th, .rep td { border:1px solid #e6e6e2; padding:4px 10px; }
             .rep svg { max-width:100%; }
           </style>
           <div class="rep">
             <div class="head">
               <img src="https://data.memau.eu/wp-content/uploads/2025/06/logo-memau-data.svg" alt="Logo" style="max-width:210px;margin:8px 0;">
               <p><i>Contact : hello@memau.eu</i></p>
             </div>
             <h1>Comparaison des scores totaux</h1>
             <p>Rapport généré le : ${today}</p>
             ${$('report').innerHTML}
           </div>`;
        document.body.appendChild(content);
        const opt = {
          margin: 8,
          filename: `comparaison_scores_totaux_${today}.pdf`,
          image: { type: 'jpeg', quality: 0.98 },
          html2canvas: { scale: 2, useCORS: true, scrollY: 0, windowHeight: 1400 },
          jsPDF: { unit: 'mm', format: 'a4', orientation: 'landscape' },
          pagebreak: { mode: ['css', 'legacy'] }
        };
        html2pdf().set(opt).from(content).save().then(() => document.body.removeChild(content));
      }

      function resetTout() {
        fichiers.length = 0;
        $('csvFiles').value = '';
        $('fileCount').innerHTML = '';
        $('report').innerHTML = '';
        $('pdfButton').style.display = 'none';
        dernierRapportPret = false;
      }
    </script>
  </body>
</html>
